<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Fun!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.5s;
  }

  /* --- Themes --- */
  body.theme-default { background: linear-gradient(135deg, #667eea, #764ba2); }
  body.theme-correct { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  body.theme-wrong   { background: linear-gradient(135deg, #f78ca0, #f9748f); }

  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 40px 48px;
    max-width: 520px;
    width: 92%;
    text-align: center;
  }

  h1 { font-size: 2rem; margin-bottom: 8px; color: #333; }

  /* --- Language picker --- */
  .lang-screen { display: flex; flex-direction: column; align-items: center; }
  .lang-screen h1 { font-size: 2.2rem; margin-bottom: 32px; }
  .lang-options { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .lang-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px 36px;
    border: 3px solid #ddd;
    border-radius: 24px;
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 160px;
  }
  .lang-btn:hover { border-color: #667eea; transform: scale(1.05); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .lang-btn:active { transform: scale(0.97); }
  .lang-flag {
    font-size: 56px;
    line-height: 1;
  }
  .lang-name {
    font-size: 1.3rem;
    font-weight: 700;
    color: #333;
  }

  /* --- Game screen (hidden initially) --- */
  .game-screen { display: none; }

  /* --- Score bar --- */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #555;
  }
  .score-bar .correct { color: #2ecc71; }
  .score-bar .streak  { color: #e67e22; }

  /* --- Difficulty selector --- */
  .mode-selector {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .mode-btn {
    padding: 8px 18px;
    border: 2px solid #ddd;
    border-radius: 50px;
    background: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .mode-btn:hover { border-color: #667eea; color: #667eea; }
  .mode-btn.active { background: #667eea; color: #fff; border-color: #667eea; }

  /* --- Problem display --- */
  .problem {
    font-size: 3.5rem;
    font-weight: 700;
    color: #333;
    margin: 24px 0;
    letter-spacing: 2px;
    min-height: 5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* --- Input area --- */
  .input-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  #answer {
    font-size: 2.2rem;
    width: 140px;
    text-align: center;
    padding: 10px;
    border: 3px solid #ddd;
    border-radius: 16px;
    outline: none;
    transition: border-color 0.3s;
    font-weight: 700;
  }
  #answer:focus { border-color: #667eea; }

  .btn-check {
    font-size: 1.6rem;
    padding: 12px 28px;
    border: none;
    border-radius: 16px;
    background: #667eea;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    transition: transform 0.15s, background 0.3s;
  }
  .btn-check:hover { background: #5a6fd6; }
  .btn-check:active { transform: scale(0.95); }

  /* --- Feedback --- */
  .feedback {
    font-size: 1.5rem;
    font-weight: 700;
    min-height: 2.2rem;
    margin-bottom: 8px;
    transition: opacity 0.3s;
  }
  .feedback.correct-text { color: #27ae60; }
  .feedback.wrong-text   { color: #e74c3c; }

  /* --- Stars streak --- */
  .stars {
    font-size: 1.8rem;
    min-height: 2rem;
    margin-bottom: 4px;
    letter-spacing: 4px;
  }

  /* --- Number pad (for touch) --- */
  .numpad {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 16px;
  }
  .numpad button {
    font-size: 1.5rem;
    padding: 14px 0;
    border: 2px solid #ddd;
    border-radius: 14px;
    background: #fff;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
  }
  .numpad button:hover { background: #667eea; color: #fff; border-color: #667eea; }
  .numpad button:active { transform: scale(0.93); }
  .numpad .wide { grid-column: span 2; }

  /* --- Settings toggle --- */
  .settings-row {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .op-btn {
    padding: 6px 16px;
    border: 2px solid #ddd;
    border-radius: 50px;
    background: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.2s;
  }
  .op-btn:hover { border-color: #764ba2; color: #764ba2; }
  .op-btn.active { background: #764ba2; color: #fff; border-color: #764ba2; }
</style>
</head>
<body class="theme-default">

<div class="card">

  <!-- ======== Language picker ======== -->
  <div class="lang-screen" id="langScreen">
    <h1>Choose Language</h1>
    <div class="lang-options">
      <button class="lang-btn" data-lang="en">
        <div class="lang-flag">&#x1F1EC;&#x1F1E7;</div>
        <span class="lang-name">English</span>
      </button>
      <button class="lang-btn" data-lang="pl">
        <div class="lang-flag">&#x1F1F5;&#x1F1F1;</div>
        <span class="lang-name">Polski</span>
      </button>
    </div>
  </div>

  <!-- ======== Game screen ======== -->
  <div class="game-screen" id="gameScreen">
    <h1 id="title">Math Fun!</h1>

    <div class="score-bar">
      <span><span id="scoreLbl">Score</span>: <span class="correct" id="scoreVal">0</span></span>
      <span><span id="streakLbl">Streak</span>: <span class="streak" id="streakVal">0</span></span>
    </div>

    <!-- Difficulty -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="easy" id="btnEasy">Easy</button>
      <button class="mode-btn" data-mode="medium" id="btnMedium">Medium</button>
      <button class="mode-btn" data-mode="hard" id="btnHard">Hard</button>
    </div>

    <!-- Operations -->
    <div class="settings-row">
      <button class="op-btn active" data-op="+">+</button>
      <button class="op-btn active" data-op="−">−</button>
      <button class="op-btn" data-op="×">×</button>
    </div>

    <div class="problem" id="problem"></div>

    <div class="feedback" id="feedback"></div>
    <div class="stars" id="stars"></div>

    <div class="input-row">
      <input id="answer" type="text" readonly autocomplete="off" />
      <button class="btn-check" id="checkBtn">GO</button>
    </div>

    <!-- Number pad for tablets / phones -->
    <div class="numpad">
      <button data-val="1">1</button>
      <button data-val="2">2</button>
      <button data-val="3">3</button>
      <button data-val="4">4</button>
      <button data-val="5">5</button>
      <button data-val="6">6</button>
      <button data-val="7">7</button>
      <button data-val="8">8</button>
      <button data-val="9">9</button>
      <button data-val="0">0</button>
      <button data-val="back">&#9003;</button>
      <button class="wide" data-val="go">GO!</button>
      <button data-val="clear">C</button>
      <button data-val="neg">−</button>
    </div>
  </div>

</div>

<script type="module">
import { pick, generateProblem, checkAnswer } from './math.js';

/* --- i18n --- */
const T = {
  en: {
    title: 'Math Fun!',
    score: 'Score',
    streak: 'Streak',
    easy: 'Easy',
    medium: 'Medium',
    hard: 'Hard',
    praise: ['Awesome!', 'Great job!', 'You rock!', 'Super!', 'Fantastic!', 'Brilliant!', 'Nice one!', 'Wow!', 'Perfect!'],
    encourage: ['Almost!', 'Try again!', 'Keep going!', 'You can do it!', 'Not quite!', 'So close!'],
    wasAnswer: 'It was',
  },
  pl: {
    title: 'Matma!',
    score: 'Wynik',
    streak: 'Seria',
    easy: 'Latwy',
    medium: 'Sredni',
    hard: 'Trudny',
    praise: ['Super!', 'Brawo!', 'Swietnie!', 'Tak trzymaj!', 'Fantastycznie!', 'Genialnie!', 'Wow!', 'Doskonale!', 'Rewelacja!'],
    encourage: ['Prawie!', 'Sprobuj jeszcze raz!', 'Nie poddawaj sie!', 'Dasz rade!', 'Niewiele brakuje!', 'Blisko!'],
    wasAnswer: 'Poprawna odpowiedz to',
  }
};

let lang = 'en';

/* --- State --- */
let correctAnswer = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let mode = 'easy';
let ops = new Set(['+', '−']);

/* --- DOM refs --- */
const langScreen = document.getElementById('langScreen');
const gameScreen = document.getElementById('gameScreen');
const titleEl    = document.getElementById('title');
const scoreLbl   = document.getElementById('scoreLbl');
const streakLbl  = document.getElementById('streakLbl');
const btnEasy    = document.getElementById('btnEasy');
const btnMedium  = document.getElementById('btnMedium');
const btnHard    = document.getElementById('btnHard');
const problemEl  = document.getElementById('problem');
const feedbackEl = document.getElementById('feedback');
const starsEl    = document.getElementById('stars');
const answerEl   = document.getElementById('answer');
const scoreEl    = document.getElementById('scoreVal');
const streakEl   = document.getElementById('streakVal');
const checkBtn   = document.getElementById('checkBtn');

/* --- Helpers --- */
const t = () => T[lang];

/* --- Language picker --- */
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    startGame();
  });
});

function startGame() {
  langScreen.style.display = 'none';
  gameScreen.style.display = 'block';
  applyLang();
  newProblem();
}

function applyLang() {
  titleEl.textContent   = t().title;
  scoreLbl.textContent  = t().score;
  streakLbl.textContent = t().streak;
  btnEasy.textContent   = t().easy;
  btnMedium.textContent = t().medium;
  btnHard.textContent   = t().hard;
}

/* --- Generate problem --- */
function newProblem() {
  const activeOps = [...ops];
  if (activeOps.length === 0) { ops.add('+'); activeOps.push('+'); updateOpButtons(); }
  const p = generateProblem(mode, activeOps);
  correctAnswer = p.correctAnswer;
  problemEl.textContent = p.text;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  answerEl.value = '';
  document.body.className = 'theme-default';
  answerEl.focus();
}

/* --- Check answer --- */
function check() {
  const result = checkAnswer(answerEl.value, correctAnswer);
  if (result === null) return;

  if (result) {
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    feedbackEl.textContent = pick(t().praise);
    feedbackEl.className = 'feedback correct-text';
    document.body.className = 'theme-correct';
    updateStars();
    setTimeout(newProblem, 900);
  } else {
    streak = 0;
    feedbackEl.textContent = `${pick(t().encourage)} ${t().wasAnswer} ${correctAnswer}.`;
    feedbackEl.className = 'feedback wrong-text';
    document.body.className = 'theme-wrong';
    updateStars();
    setTimeout(newProblem, 1800);
  }

  scoreEl.textContent = score;
  streakEl.textContent = streak;
}

function updateStars() {
  starsEl.textContent = streak > 0 ? Array(Math.min(streak, 10)).fill('\u2B50').join('') : '';
}

/* --- Difficulty buttons --- */
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    newProblem();
  });
});

/* --- Operation toggle buttons --- */
function updateOpButtons() {
  document.querySelectorAll('.op-btn').forEach(b => {
    b.classList.toggle('active', ops.has(b.dataset.op));
  });
}
document.querySelectorAll('.op-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const op = btn.dataset.op;
    if (ops.has(op) && ops.size > 1) ops.delete(op);
    else ops.add(op);
    updateOpButtons();
    newProblem();
  });
});

/* --- Submit via button or Enter --- */
checkBtn.addEventListener('click', check);
answerEl.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });

/* --- Numpad --- */
document.querySelectorAll('.numpad button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.val;
    if (v === 'go') { check(); return; }
    if (v === 'clear') { answerEl.value = ''; answerEl.focus(); return; }
    if (v === 'back') { answerEl.value = answerEl.value.slice(0, -1); answerEl.focus(); return; }
    if (v === 'neg') {
      answerEl.value = answerEl.value.startsWith('-') ? answerEl.value.slice(1) : '-' + answerEl.value;
      answerEl.focus();
      return;
    }
    answerEl.value += v;
    answerEl.focus();
  });
});
</script>
</body>
</html>
