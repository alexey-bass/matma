<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Fun!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.5s;
  }

  /* --- Themes --- */
  body.theme-default { background: linear-gradient(135deg, #667eea, #764ba2); }
  body.theme-correct { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  body.theme-wrong   { background: linear-gradient(135deg, #f78ca0, #f9748f); }

  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 40px 48px;
    max-width: 520px;
    width: 92%;
    text-align: center;
  }

  h1 { font-size: 2rem; margin-bottom: 8px; color: #333; }

  /* --- Language picker --- */
  .lang-screen { display: flex; flex-direction: column; align-items: center; }
  .lang-screen h1 { font-size: 2.2rem; margin-bottom: 32px; }
  .lang-options { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .lang-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px 36px;
    border: 3px solid #ddd;
    border-radius: 24px;
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 160px;
  }
  .lang-btn:hover { border-color: #667eea; transform: scale(1.05); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .lang-btn:active { transform: scale(0.97); }
  .lang-flag {
    font-size: 56px;
    line-height: 1;
  }
  .lang-name {
    font-size: 1.3rem;
    font-weight: 700;
    color: #333;
  }

  /* --- Game screen (hidden initially) --- */
  .game-screen { display: none; }

  /* --- Score bar --- */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #555;
  }
  .score-bar .correct { color: #2ecc71; }
  .score-bar .streak  { color: #e67e22; }

  /* --- Difficulty selector --- */
  .mode-selector {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .mode-btn {
    padding: 8px 18px;
    border: 2px solid #ddd;
    border-radius: 50px;
    background: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .mode-btn:hover { border-color: #667eea; color: #667eea; }
  .mode-btn.active { background: #667eea; color: #fff; border-color: #667eea; }

  /* --- Problem display --- */
  .problem {
    font-size: 3.5rem;
    font-weight: 700;
    color: #333;
    margin: 24px 0;
    letter-spacing: 2px;
    min-height: 5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* --- Input area --- */
  .input-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  #answer {
    font-size: 2.2rem;
    width: 140px;
    text-align: center;
    padding: 10px;
    border: 3px solid #ddd;
    border-radius: 16px;
    outline: none;
    transition: border-color 0.3s;
    font-weight: 700;
  }
  #answer:focus { border-color: #667eea; }

  .btn-check {
    font-size: 1.6rem;
    padding: 12px 28px;
    border: none;
    border-radius: 16px;
    background: #667eea;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    transition: transform 0.15s, background 0.3s;
  }
  .btn-check:hover { background: #5a6fd6; }
  .btn-check:active { transform: scale(0.95); }

  /* --- Feedback --- */
  .feedback {
    font-size: 1.5rem;
    font-weight: 700;
    min-height: 2.2rem;
    margin-bottom: 8px;
    transition: opacity 0.3s;
  }
  .feedback.correct-text { color: #27ae60; }
  .feedback.wrong-text   { color: #e74c3c; }

  /* --- Stars streak --- */
  .stars {
    font-size: 1.8rem;
    min-height: 2rem;
    margin-bottom: 4px;
    letter-spacing: 4px;
  }

  /* --- Number pad (for touch) --- */
  .numpad {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 16px;
  }
  .numpad button {
    font-size: 1.5rem;
    padding: 14px 0;
    border: 2px solid #ddd;
    border-radius: 14px;
    background: #fff;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
  }
  .numpad button:hover { background: #667eea; color: #fff; border-color: #667eea; }
  .numpad button:active { transform: scale(0.93); }
  .numpad .wide { grid-column: span 2; }

  /* --- Settings toggle --- */
  .settings-row {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .op-btn {
    padding: 6px 16px;
    border: 2px solid #ddd;
    border-radius: 50px;
    background: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.2s;
  }
  .op-btn:hover { border-color: #764ba2; color: #764ba2; }
  .op-btn.active { background: #764ba2; color: #fff; border-color: #764ba2; }

  /* --- Mode picker --- */
  .mode-screen { display: flex; flex-direction: column; align-items: center; }
  .mode-screen h1 { font-size: 2.2rem; margin-bottom: 32px; }

  /* --- Challenge setup --- */
  .challenge-setup { display: flex; flex-direction: column; align-items: center; }
  .challenge-setup h1 { font-size: 2.2rem; margin-bottom: 24px; }
  .setup-section { margin-bottom: 20px; width: 100%; }
  .setup-label {
    font-size: 1.1rem;
    font-weight: 700;
    color: #555;
    margin-bottom: 10px;
  }
  .btn-start {
    margin-top: 16px;
    font-size: 1.8rem;
    padding: 16px 48px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: #333;
    cursor: pointer;
    font-weight: 800;
    letter-spacing: 2px;
    transition: transform 0.15s;
  }
  .btn-start:hover { transform: scale(1.05); }
  .btn-start:active { transform: scale(0.97); }

  /* --- Timer bar --- */
  .timer-bar {
    margin-bottom: 12px;
  }
  .timer-display {
    font-size: 2rem;
    font-weight: 800;
    color: #e67e22;
  }
  .timer-display.urgent {
    color: #e74c3c;
    animation: pulse 0.5s infinite alternate;
  }
  @keyframes pulse { to { opacity: 0.5; } }

  /* --- Results screen --- */
  .results-screen { display: flex; flex-direction: column; align-items: center; }
  .results-screen h1 { font-size: 2.2rem; margin-bottom: 24px; }
  .results-stats {
    width: 100%;
    margin-bottom: 16px;
  }
  .result-row {
    font-size: 1.4rem;
    font-weight: 700;
    padding: 8px 0;
    color: #333;
  }

  /* --- Compact layout for small screens --- */
  @media (max-height: 750px) {
    .card { padding: 24px 28px; }
    h1 { font-size: 1.6rem; }
    .problem { font-size: 2.8rem; margin: 16px 0; min-height: 3.5rem; }
    #answer { font-size: 1.8rem; padding: 8px; }
    .numpad button { font-size: 1.2rem; padding: 10px 0; }
    .numpad { gap: 5px; margin-top: 10px; }
    .score-bar { margin-bottom: 16px; }
    .mode-selector { margin-bottom: 12px; }
    .feedback { font-size: 1.2rem; min-height: 1.8rem; }
    .stars { font-size: 1.4rem; min-height: 1.6rem; }
    .input-row { margin-bottom: 12px; }
  }

  /* --- About button & modal --- */
  .about-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .about-btn:hover { opacity: 0.8; }

  .about-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .about-overlay.visible { display: flex; pointer-events: auto; }
  .about-box {
    background: #fff;
    border-radius: 20px;
    padding: 32px 36px;
    max-width: 360px;
    width: 88%;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .about-box h2 { font-size: 1.6rem; margin-bottom: 16px; color: #333; }
  .about-box a {
    color: #667eea;
    text-decoration: none;
    font-weight: 600;
  }
  .about-box a:hover { text-decoration: underline; }
  .about-box p { margin: 10px 0; font-size: 1.05rem; color: #555; }
  .about-close {
    margin-top: 18px;
    padding: 8px 28px;
    border: 2px solid #ddd;
    border-radius: 50px;
    background: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .about-close:hover { border-color: #667eea; color: #667eea; }
</style>
</head>
<body class="theme-default">

<div class="card" style="position:relative;">
  <button class="about-btn" id="aboutBtn" title="About">&#x2139;&#xFE0F;</button>

  <!-- ======== About overlay ======== -->
  <div class="about-overlay" id="aboutOverlay">
    <div class="about-box">
      <h2>Math Fun!</h2>
      <p>&copy; <a href="https://www.linkedin.com/in/alexeybass/" target="_blank" rel="noopener">Alexey Bass</a></p>
      <p><a href="https://github.com/alexey-bass/matma" target="_blank" rel="noopener">GitHub</a></p>
      <button class="about-close" id="aboutClose">OK</button>
    </div>
  </div>

  <!-- ======== Language picker ======== -->
  <div class="lang-screen" id="langScreen">
    <h1>Choose Language</h1>
    <div class="lang-options">
      <button class="lang-btn" data-lang="pl">
        <div class="lang-flag">&#x1F1F5;&#x1F1F1;</div>
        <span class="lang-name">Polski</span>
      </button>
      <button class="lang-btn" data-lang="en">
        <div class="lang-flag">&#x1F1EC;&#x1F1E7;</div>
        <span class="lang-name">English</span>
      </button>
    </div>
  </div>

  <!-- ======== Mode picker ======== -->
  <div class="mode-screen" id="modeScreen" style="display:none">
    <h1 id="modeTitle">Choose Mode</h1>
    <div class="lang-options">
      <button class="lang-btn" id="btnPractice" data-gmode="practice">
        <div class="lang-flag">&#x1F4DA;</div>
        <span class="lang-name" id="practiceLabel">Practice</span>
      </button>
      <button class="lang-btn" id="btnChallenge" data-gmode="challenge">
        <div class="lang-flag">&#x1F3C6;</div>
        <span class="lang-name" id="challengeLabel">Challenge</span>
      </button>
      <button class="lang-btn" id="btnTables" data-gmode="tables">
        <div class="lang-flag">&#x1F9EE;</div>
        <span class="lang-name" id="tablesLabel">Times Tables</span>
      </button>
    </div>
  </div>

  <!-- ======== Challenge setup ======== -->
  <div class="challenge-setup" id="challengeSetup" style="display:none">
    <h1 id="challengeTitle">Challenge Mode</h1>

    <div class="setup-section">
      <div class="setup-label" id="timerLabel">Timer</div>
      <div class="mode-selector">
        <button class="mode-btn" data-timer="120">2 min</button>
        <button class="mode-btn active" data-timer="300">5 min</button>
        <button class="mode-btn" data-timer="600">10 min</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label" id="difficultyLabel">Difficulty</div>
      <div class="mode-selector">
        <button class="mode-btn active" data-cmode="easy" id="cBtnEasy">Easy</button>
        <button class="mode-btn" data-cmode="medium" id="cBtnMedium">Medium</button>
        <button class="mode-btn" data-cmode="hard" id="cBtnHard">Hard</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label" id="operationsLabel">Operations</div>
      <div class="settings-row">
        <button class="op-btn active" data-cop="+">+</button>
        <button class="op-btn active" data-cop="−">−</button>
        <button class="op-btn" data-cop="×">×</button>
        <button class="op-btn" data-cop="÷">÷</button>
      </div>
    </div>

    <button class="btn-start" id="btnStart">START</button>
  </div>

  <!-- ======== Results screen ======== -->
  <div class="results-screen" id="resultsScreen" style="display:none">
    <h1 id="resultsTitle">Results</h1>
    <div class="results-stats">
      <div class="result-row correct-text">
        <span id="resCorrectLbl">Correct</span>: <span id="resCorrect">0</span>
      </div>
      <div class="result-row wrong-text">
        <span id="resWrongLbl">Wrong</span>: <span id="resWrong">0</span>
      </div>
      <div class="result-row">
        <span id="resTotalLbl">Total</span>: <span id="resTotal">0</span>
      </div>
      <div class="result-row">
        <span id="resAvgLbl">Avg time</span>: <span id="resAvg">0</span><span id="resAvgUnit">s</span>
      </div>
    </div>
    <button class="btn-start" id="btnPlayAgain">Play Again</button>
  </div>

  <!-- ======== Game screen ======== -->
  <div class="game-screen" id="gameScreen">
    <h1 id="title">Math Fun!</h1>

    <div class="timer-bar" id="timerBar" style="display:none">
      <span class="timer-display" id="timerDisplay">5:00</span>
    </div>

    <div class="score-bar">
      <span><span id="scoreLbl">Score</span>: <span class="correct" id="scoreVal">0</span></span>
      <span><span id="streakLbl">Streak</span>: <span class="streak" id="streakVal">0</span></span>
    </div>

    <div class="score-bar" id="progressBar" style="display:none">
      <span><span id="progressLbl">Progress</span>: <span id="progressVal">0 / 0</span></span>
    </div>

    <!-- Difficulty -->
    <div class="mode-selector" id="gameDifficulty">
      <button class="mode-btn active" data-mode="easy" id="btnEasy">Easy</button>
      <button class="mode-btn" data-mode="medium" id="btnMedium">Medium</button>
      <button class="mode-btn" data-mode="hard" id="btnHard">Hard</button>
    </div>

    <!-- Operations -->
    <div class="settings-row" id="gameOps">
      <button class="op-btn active" data-op="+">+</button>
      <button class="op-btn active" data-op="−">−</button>
      <button class="op-btn" data-op="×">×</button>
      <button class="op-btn" data-op="÷">÷</button>
    </div>

    <div class="problem" id="problem"></div>

    <div class="feedback" id="feedback"></div>
    <div class="stars" id="stars"></div>

    <div class="input-row">
      <input id="answer" type="text" readonly autocomplete="off" />
      <button class="btn-check" id="checkBtn">GO</button>
    </div>

    <!-- Number pad for tablets / phones -->
    <div class="numpad">
      <button data-val="1">1</button>
      <button data-val="2">2</button>
      <button data-val="3">3</button>
      <button data-val="4">4</button>
      <button data-val="5">5</button>
      <button data-val="6">6</button>
      <button data-val="7">7</button>
      <button data-val="8">8</button>
      <button data-val="9">9</button>
      <button data-val="0">0</button>
      <button data-val="back">&#9003;</button>
      <button class="wide" data-val="go">GO!</button>
      <button data-val="clear">C</button>
      <button data-val="neg">−</button>
    </div>
  </div>

</div>

<script type="module">
import { pick, shuffle, generateProblem, generateTableProblems, checkAnswer } from './math.js';

/* --- i18n --- */
const T = {
  en: {
    title: 'Math Fun!',
    score: 'Score',
    streak: 'Streak',
    easy: 'Easy',
    medium: 'Medium',
    hard: 'Hard',
    praise: ['Awesome!', 'Great job!', 'You rock!', 'Super!', 'Fantastic!', 'Brilliant!', 'Nice one!', 'Wow!', 'Perfect!'],
    encourage: ['Almost!', 'Try again!', 'Keep going!', 'You can do it!', 'Not quite!', 'So close!'],
    wasAnswer: 'It was',
    chooseMode: 'Choose Mode',
    practice: 'Practice',
    challenge: 'Challenge',
    challengeTitle: 'Challenge Mode',
    timer: 'Timer',
    difficulty: 'Difficulty',
    operations: 'Operations',
    results: 'Results',
    correct: 'Correct',
    wrong: 'Wrong',
    total: 'Total',
    avgTime: 'Avg time',
    playAgain: 'Play Again',
    timesTables: 'Times Tables',

    progress: 'Progress',
  },
  pl: {
    title: 'Matma!',
    score: 'Wynik',
    streak: 'Seria',
    easy: 'Latwy',
    medium: 'Sredni',
    hard: 'Trudny',
    praise: ['Super!', 'Brawo!', 'Swietnie!', 'Tak trzymaj!', 'Fantastycznie!', 'Genialnie!', 'Wow!', 'Doskonale!', 'Rewelacja!'],
    encourage: ['Prawie!', 'Sprobuj jeszcze raz!', 'Nie poddawaj sie!', 'Dasz rade!', 'Niewiele brakuje!', 'Blisko!'],
    wasAnswer: 'Poprawna odpowiedz to',
    chooseMode: 'Wybierz tryb',
    practice: 'Cwiczenia',
    challenge: 'Wyzwanie',
    challengeTitle: 'Tryb wyzwania',
    timer: 'Czas',
    difficulty: 'Poziom',
    operations: 'Dzialania',
    results: 'Wyniki',
    correct: 'Poprawne',
    wrong: 'Bledne',
    total: 'Razem',
    avgTime: 'Sredni czas',
    playAgain: 'Zagraj ponownie',
    timesTables: 'Tabliczka mno\u017Cenia',

    progress: 'Post\u0119p',
  },
};

let lang = 'en';

/* --- State --- */
let correctAnswer = 0;
let score = 0;
let wrongCount = 0;
let streak = 0;
let bestStreak = 0;
let mode = 'easy';
let ops = new Set(['+', '−']);
let gameMode = 'practice'; // 'practice' or 'challenge'
let challengeTimer = 300;  // seconds
let challengeOps = new Set(['+', '−']);
let timerInterval = null;
let timeRemaining = 0;
let problemStartTime = 0;
let totalSolveTime = 0;
let seenProblems = new Set();
let tableProblems = [];
let tableIndex = 0;

/* --- DOM refs --- */
const langScreen      = document.getElementById('langScreen');
const modeScreen      = document.getElementById('modeScreen');
const challengeSetup  = document.getElementById('challengeSetup');
const resultsScreen   = document.getElementById('resultsScreen');
const gameScreen      = document.getElementById('gameScreen');
const titleEl         = document.getElementById('title');
const scoreLbl        = document.getElementById('scoreLbl');
const streakLbl       = document.getElementById('streakLbl');
const btnEasy         = document.getElementById('btnEasy');
const btnMedium       = document.getElementById('btnMedium');
const btnHard         = document.getElementById('btnHard');
const problemEl       = document.getElementById('problem');
const feedbackEl      = document.getElementById('feedback');
const starsEl         = document.getElementById('stars');
const answerEl        = document.getElementById('answer');
const scoreEl         = document.getElementById('scoreVal');
const streakEl        = document.getElementById('streakVal');
const checkBtn        = document.getElementById('checkBtn');
const timerBar        = document.getElementById('timerBar');
const timerDisplay    = document.getElementById('timerDisplay');

/* --- Helpers --- */
const t = () => T[lang];

function showScreen(screen) {
  [langScreen, modeScreen, challengeSetup, resultsScreen, gameScreen].forEach(s => s.style.display = 'none');
  screen.style.display = 'block';
  if (screen === modeScreen || screen === langScreen) screen.style.display = 'flex';
  if (screen === challengeSetup || screen === resultsScreen) screen.style.display = 'flex';
}

/* --- Language picker --- */
document.querySelectorAll('.lang-btn[data-lang]').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    applyAllLang();
    showScreen(modeScreen);
  });
});

/* --- Mode picker --- */
document.getElementById('btnPractice').addEventListener('click', () => {
  gameMode = 'practice';
  startPractice();
});
document.getElementById('btnChallenge').addEventListener('click', () => {
  gameMode = 'challenge';
  showScreen(challengeSetup);
});
document.getElementById('btnTables').addEventListener('click', () => {
  gameMode = 'tables';
  tableProblems = shuffle(generateTableProblems([1, 2, 3, 4, 5, 6, 7, 8, 9]));
  tableIndex = 0;
  resetStats();
  showScreen(gameScreen);
  applyGameLang();
  document.getElementById('gameDifficulty').style.display = 'none';
  document.getElementById('gameOps').style.display = 'none';
  document.getElementById('progressBar').style.display = 'flex';
  timerBar.style.display = 'none';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  newProblem();
});

function startPractice() {
  timerBar.style.display = 'none';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('gameDifficulty').style.display = 'flex';
  document.getElementById('gameOps').style.display = 'flex';
  document.getElementById('progressBar').style.display = 'none';
  showScreen(gameScreen);
  applyGameLang();
  resetStats();
  newProblem();
}

function resetStats() {
  score = 0;
  wrongCount = 0;
  streak = 0;
  bestStreak = 0;
  totalSolveTime = 0;
  scoreEl.textContent = '0';
  streakEl.textContent = '0';
  starsEl.textContent = '';
}

function applyAllLang() {
  // Mode screen
  document.getElementById('modeTitle').textContent = t().chooseMode;
  document.getElementById('practiceLabel').textContent = t().practice;
  document.getElementById('challengeLabel').textContent = t().challenge;

  // Challenge setup
  document.getElementById('challengeTitle').textContent = t().challengeTitle;
  document.getElementById('timerLabel').textContent = t().timer;
  document.getElementById('difficultyLabel').textContent = t().difficulty;
  document.getElementById('operationsLabel').textContent = t().operations;
  document.getElementById('cBtnEasy').textContent = t().easy;
  document.getElementById('cBtnMedium').textContent = t().medium;
  document.getElementById('cBtnHard').textContent = t().hard;

  // Tables & progress
  document.getElementById('tablesLabel').textContent = t().timesTables;
  document.getElementById('progressLbl').textContent = t().progress;

  // Results screen
  document.getElementById('resultsTitle').textContent = t().results;
  document.getElementById('resCorrectLbl').textContent = t().correct;
  document.getElementById('resWrongLbl').textContent = t().wrong;
  document.getElementById('resTotalLbl').textContent = t().total;
  document.getElementById('resAvgLbl').textContent = t().avgTime;
  document.getElementById('btnPlayAgain').textContent = t().playAgain;

  applyGameLang();
}

function applyGameLang() {
  titleEl.textContent   = t().title;
  scoreLbl.textContent  = t().score;
  streakLbl.textContent = t().streak;
  btnEasy.textContent   = t().easy;
  btnMedium.textContent = t().medium;
  btnHard.textContent   = t().hard;
}

/* --- Challenge setup controls --- */
document.querySelectorAll('[data-timer]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-timer]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    challengeTimer = parseInt(btn.dataset.timer, 10);
  });
});

document.querySelectorAll('[data-cmode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-cmode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.querySelectorAll('[data-cop]').forEach(btn => {
  btn.addEventListener('click', () => {
    const op = btn.dataset.cop;
    if (challengeOps.has(op) && challengeOps.size > 1) challengeOps.delete(op);
    else challengeOps.add(op);
    document.querySelectorAll('[data-cop]').forEach(b => {
      b.classList.toggle('active', challengeOps.has(b.dataset.cop));
    });
  });
});

/* --- Start challenge --- */
document.getElementById('btnStart').addEventListener('click', () => {
  // Apply challenge settings to game
  const activeMode = document.querySelector('[data-cmode].active');
  mode = activeMode ? activeMode.dataset.cmode : 'easy';
  ops = new Set(challengeOps);

  // Sync game difficulty buttons
  document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
  const matchBtn = document.querySelector(`.mode-btn[data-mode="${mode}"]`);
  if (matchBtn) matchBtn.classList.add('active');

  // Sync game operation buttons
  document.querySelectorAll('.op-btn[data-op]').forEach(b => {
    b.classList.toggle('active', ops.has(b.dataset.op));
  });

  resetStats();
  showScreen(gameScreen);
  applyGameLang();
  document.getElementById('gameDifficulty').style.display = 'flex';
  document.getElementById('gameOps').style.display = 'flex';
  document.getElementById('progressBar').style.display = 'none';
  seenProblems = new Set();

  // Start timer
  timeRemaining = challengeTimer;
  timerBar.style.display = 'block';
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeRemaining--;
    updateTimerDisplay();
    if (timeRemaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      endChallenge();
    }
  }, 1000);

  newProblem();
});

function updateTimerDisplay() {
  const min = Math.floor(timeRemaining / 60);
  const sec = timeRemaining % 60;
  timerDisplay.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
  timerDisplay.classList.toggle('urgent', timeRemaining <= 10);
}

function endChallenge() {
  showScreen(resultsScreen);
  document.body.className = 'theme-default';
  const totalAnswered = score + wrongCount;
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = wrongCount;
  document.getElementById('resTotal').textContent = totalAnswered;
  const avg = totalAnswered > 0 ? (totalSolveTime / totalAnswered / 1000).toFixed(1) : '0';
  document.getElementById('resAvg').textContent = avg;
  document.getElementById('resAvgUnit').textContent = 's';
}

/* --- Play again --- */
document.getElementById('btnPlayAgain').addEventListener('click', () => {
  showScreen(modeScreen);
});

/* --- Generate problem --- */
function newProblem() {
  if (gameMode === 'tables') {
    if (tableIndex >= tableProblems.length) {
      endChallenge();
      return;
    }
    const p = tableProblems[tableIndex];
    tableIndex++;
    correctAnswer = p.correctAnswer;
    problemEl.textContent = p.text;
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    answerEl.value = '';
    document.body.className = 'theme-default';
    problemStartTime = Date.now();
    document.getElementById('progressVal').textContent = `${tableIndex} / ${tableProblems.length}`;
    answerEl.focus();
    return;
  }

  const activeOps = [...ops];
  if (activeOps.length === 0) { ops.add('+'); activeOps.push('+'); updateOpButtons(); }

  let p;
  let attempts = 0;
  do {
    p = generateProblem(mode, activeOps);
    attempts++;
  } while (gameMode === 'challenge' && seenProblems.has(`${p.a} ${p.op} ${p.b}`) && attempts < 50);

  if (gameMode === 'challenge') {
    seenProblems.add(`${p.a} ${p.op} ${p.b}`);
  }

  correctAnswer = p.correctAnswer;
  problemEl.textContent = p.text;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  answerEl.value = '';
  document.body.className = 'theme-default';
  problemStartTime = Date.now();
  answerEl.focus();
}

/* --- Check answer --- */
function check() {
  if (gameMode === 'challenge' && !timerInterval) return;
  const result = checkAnswer(answerEl.value, correctAnswer);
  if (result === null) return;

  const solveTime = Date.now() - problemStartTime;
  totalSolveTime += solveTime;

  if (result) {
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    feedbackEl.textContent = pick(t().praise);
    feedbackEl.className = 'feedback correct-text';
    document.body.className = 'theme-correct';
    updateStars();
    setTimeout(newProblem, 900);
  } else {
    wrongCount++;
    streak = 0;
    feedbackEl.textContent = `${pick(t().encourage)} ${t().wasAnswer} ${correctAnswer}.`;
    feedbackEl.className = 'feedback wrong-text';
    document.body.className = 'theme-wrong';
    updateStars();
    setTimeout(newProblem, 1800);
  }

  scoreEl.textContent = score;
  streakEl.textContent = streak;
}

function updateStars() {
  starsEl.textContent = streak > 0 ? Array(Math.min(streak, 10)).fill('\u2B50').join('') : '';
}

/* --- Difficulty buttons --- */
document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    newProblem();
  });
});

/* --- Operation toggle buttons --- */
function updateOpButtons() {
  document.querySelectorAll('.op-btn[data-op]').forEach(b => {
    b.classList.toggle('active', ops.has(b.dataset.op));
  });
}
document.querySelectorAll('.op-btn[data-op]').forEach(btn => {
  btn.addEventListener('click', () => {
    const op = btn.dataset.op;
    if (ops.has(op) && ops.size > 1) ops.delete(op);
    else ops.add(op);
    updateOpButtons();
    newProblem();
  });
});

/* --- Submit via button or Enter --- */
checkBtn.addEventListener('click', check);
answerEl.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });

/* --- Numpad --- */
document.querySelectorAll('.numpad button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.val;
    if (v === 'go') { check(); return; }
    if (v === 'clear') { answerEl.value = ''; answerEl.focus(); return; }
    if (v === 'back') { answerEl.value = answerEl.value.slice(0, -1); answerEl.focus(); return; }
    if (v === 'neg') {
      answerEl.value = answerEl.value.startsWith('-') ? answerEl.value.slice(1) : '-' + answerEl.value;
      answerEl.focus();
      return;
    }
    answerEl.value += v;
    answerEl.focus();
  });
});

/* --- About popup --- */
const aboutOverlay = document.getElementById('aboutOverlay');
document.getElementById('aboutBtn').addEventListener('click', () => aboutOverlay.classList.add('visible'));
document.getElementById('aboutClose').addEventListener('click', () => aboutOverlay.classList.remove('visible'));
aboutOverlay.addEventListener('click', e => { if (e.target === aboutOverlay) aboutOverlay.classList.remove('visible'); });
</script>
</body>
</html>
